<!-- @dsCard group="Spacing" viewport="700x160" name="Shadows" subtitle="Subtle only — sm, md, lg" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:28px; font-family: var(--font-sans); background: var(--surface-subtle); }
  .row { display:flex; gap:28px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .box { width:150px; height:74px; background:var(--white); border:1px solid var(--border-subtle); border-radius:var(--radius-card); }
  .lbl { font-size:12px; color:var(--text-body); font-weight:500; }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">shadow-sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">shadow-md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">shadow-lg</span></div>
  </div>
</body></html>
