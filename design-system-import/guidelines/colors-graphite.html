<!-- @dsCard group="Colors" viewport="700x150" name="Graphite (Primary)" subtitle="Neutral scale — the dominant brand color" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; font-family: var(--font-sans); background: var(--surface-page); }
  .scale { display:flex; gap:0; border-radius:12px; overflow:hidden; border:1px solid var(--border-subtle); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .n { font-size:11px; font-weight:700; }
  .h { font-size:10px; opacity:.8; font-variant-numeric:tabular-nums; }
</style></head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--graphite-50)"><span class="n" style="color:#18181B">50</span><span class="h" style="color:#3F3F46">#FAFAFA</span></div>
  <div class="sw" style="background:var(--graphite-100)"><span class="n" style="color:#18181B">100</span><span class="h" style="color:#3F3F46">#F4F4F5</span></div>
  <div class="sw" style="background:var(--graphite-200)"><span class="n" style="color:#18181B">200</span><span class="h" style="color:#3F3F46">#E4E4E7</span></div>
  <div class="sw" style="background:var(--graphite-400)"><span class="n" style="color:#fff">400</span><span class="h" style="color:#fff">#A1A1AA</span></div>
  <div class="sw" style="background:var(--graphite-500)"><span class="n" style="color:#fff">500</span><span class="h" style="color:#fff">#71717A</span></div>
  <div class="sw" style="background:var(--graphite-700)"><span class="n" style="color:#fff">700</span><span class="h" style="color:#fff">#3F3F46</span></div>
  <div class="sw" style="background:var(--graphite-800)"><span class="n" style="color:#fff">800</span><span class="h" style="color:#fff">#27272A</span></div>
  <div class="sw" style="background:var(--graphite-900)"><span class="n" style="color:#fff">900</span><span class="h" style="color:#fff">#18181B</span></div>
</div>
</body></html>
