<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base · 24px card/grid · 80px section" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px; font-family: var(--font-sans); background: var(--surface-page); }
  .row { display:flex; align-items:flex-end; gap:16px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background:var(--orange-500); border-radius:4px; }
  .lbl { font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:var(--space-1);height:var(--space-1)"></div><span class="lbl">4</span></div>
    <div class="item"><div class="box" style="width:var(--space-2);height:var(--space-2)"></div><span class="lbl">8</span></div>
    <div class="item"><div class="box" style="width:var(--space-3);height:var(--space-3)"></div><span class="lbl">12</span></div>
    <div class="item"><div class="box" style="width:var(--space-4);height:var(--space-4)"></div><span class="lbl">16</span></div>
    <div class="item"><div class="box" style="width:var(--space-6);height:var(--space-6)"></div><span class="lbl">24</span></div>
    <div class="item"><div class="box" style="width:var(--space-8);height:var(--space-8)"></div><span class="lbl">32</span></div>
    <div class="item"><div class="box" style="width:var(--space-12);height:var(--space-12)"></div><span class="lbl">48</span></div>
    <div class="item"><div class="box" style="width:var(--space-16);height:var(--space-16)"></div><span class="lbl">64</span></div>
    <div class="item"><div class="box" style="width:var(--space-20);height:var(--space-20)"></div><span class="lbl">80</span></div>
  </div>
</body></html>
