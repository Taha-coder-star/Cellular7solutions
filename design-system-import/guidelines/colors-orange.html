<!-- @dsCard group="Colors" viewport="700x150" name="Brand Orange (Accent)" subtitle="Reserved for repair & service actions only" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; font-family: var(--font-sans); background: var(--surface-page); }
  .scale { display:flex; gap:0; border-radius:12px; overflow:hidden; border:1px solid var(--border-subtle); }
  .sw { flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .n { font-size:11px; font-weight:700; }
  .h { font-size:10px; opacity:.85; font-variant-numeric:tabular-nums; }
</style></head>
<body>
<div class="scale">
  <div class="sw" style="background:var(--orange-50)"><span class="n" style="color:#7C2D12">50</span><span class="h" style="color:#C2410C">#FFF7ED</span></div>
  <div class="sw" style="background:var(--orange-100)"><span class="n" style="color:#7C2D12">100</span><span class="h" style="color:#C2410C">#FFEDD5</span></div>
  <div class="sw" style="background:var(--orange-300)"><span class="n" style="color:#7C2D12">300</span><span class="h" style="color:#7C2D12">#FDBA74</span></div>
  <div class="sw" style="background:var(--orange-500)"><span class="n" style="color:#fff">500</span><span class="h" style="color:#fff">#F97316</span></div>
  <div class="sw" style="background:var(--orange-600)"><span class="n" style="color:#fff">600</span><span class="h" style="color:#fff">#EA580C</span></div>
  <div class="sw" style="background:var(--orange-700)"><span class="n" style="color:#fff">700</span><span class="h" style="color:#fff">#C2410C</span></div>
  <div class="sw" style="background:var(--orange-900)"><span class="n" style="color:#fff">900</span><span class="h" style="color:#fff">#7C2D12</span></div>
</div>
</body></html>
