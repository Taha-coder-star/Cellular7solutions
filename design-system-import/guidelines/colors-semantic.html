<!-- @dsCard group="Colors" viewport="700x150" name="Semantic / Status" subtitle="Success, warning, danger, info" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:20px; font-family: var(--font-sans); background: var(--surface-page); }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .cell { border:1px solid var(--border-subtle); border-radius:12px; overflow:hidden; }
  .bar { height:56px; }
  .meta { padding:8px 10px; }
  .name { font-size:12px; font-weight:600; color:var(--text-strong); }
  .hex { font-size:11px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
</style></head>
<body>
<div class="grid">
  <div class="cell"><div class="bar" style="background:var(--success-500)"></div><div class="meta"><div class="name">Success</div><div class="hex">#16A34A</div></div></div>
  <div class="cell"><div class="bar" style="background:var(--warning-500)"></div><div class="meta"><div class="name">Warning</div><div class="hex">#D97706</div></div></div>
  <div class="cell"><div class="bar" style="background:var(--danger-500)"></div><div class="meta"><div class="name">Danger</div><div class="hex">#DC2626</div></div></div>
  <div class="cell"><div class="bar" style="background:var(--info-500)"></div><div class="meta"><div class="name">Info</div><div class="hex">#2563EB</div></div></div>
</div>
</body></html>
