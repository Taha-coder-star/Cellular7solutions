<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px; font-family: var(--font-sans); background: var(--surface-page); color: var(--text-strong); }
  .big { font-size:52px; letter-spacing:var(--ls-tight); line-height:1; }
  .weights { display:flex; gap:22px; margin-top:14px; font-size:15px; color:var(--text-body); }
  .weights b { color:var(--text-faint); font-weight:600; }
</style></head>
<body>
  <div class="big"><span style="font-weight:400">Aa</span> <span style="font-weight:500">Aa</span> <span style="font-weight:600">Aa</span> <span style="font-weight:700">Aa</span> <span style="font-weight:800">Aa</span></div>
  <div class="weights">
    <span style="font-weight:400">Regular <b>400</b></span>
    <span style="font-weight:500">Medium <b>500</b></span>
    <span style="font-weight:600">Semibold <b>600</b></span>
    <span style="font-weight:700">Bold <b>700</b></span>
    <span style="font-weight:800">Extrabold <b>800</b></span>
  </div>
</body></html>
