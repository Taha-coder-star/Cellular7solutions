<!-- @dsCard group="Components" viewport="700x360" name="Cards, Badges & Rating" subtitle="Product & repair cards, status pills, stars" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-subtle); font-family: var(--font-sans); }
  .cards { display: grid; grid-template-columns: 230px 230px; gap: 20px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-faint); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { ProductCard, RepairCard, Badge, StatusBadge, Rating } = window.CellularSolutionsDesignSystem_a109cf;
  function Demo() {
    return (
      <div className="row" style={{ alignItems: 'flex-start', gap: 24 }}>
        <div className="cards">
          <ProductCard product={{ name: 'iPhone 15 Pro', brand: 'Apple', price: 999, condition: 'new', rating: 4.7, reviews: 214, stock: 8 }} />
          <RepairCard repair={{ deviceType: 'iPhone', repairType: 'Screen Replacement', time: '45 min', startingPrice: 89, icon: 'smartphone' }} />
        </div>
        <div className="stack">
          <span className="lbl">Badges</span>
          <div className="row"><Badge tone="new">New</Badge><Badge tone="used">Used</Badge><Badge tone="orange">Featured</Badge><Badge tone="outline">iPhone</Badge></div>
          <span className="lbl">Status</span>
          <div className="row"><StatusBadge status="pending" /><StatusBadge status="in-progress" /><StatusBadge status="delivered" /></div>
          <div className="row"><StatusBadge status="shipped" /><StatusBadge status="cancelled" /></div>
          <span className="lbl">Rating</span>
          <Rating value={4.5} count={128} />
          <Rating value={3.0} showValue />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  if (window.lucide) lucide.createIcons();
</script>
</body>
</html>
