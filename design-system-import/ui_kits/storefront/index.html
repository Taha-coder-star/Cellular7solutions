<!-- @startingPoint section="Storefront" subtitle="Full customer storefront (home, shop, product, services)" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cellular Solutions — Storefront</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); color: var(--text-body); }
  a { color: var(--orange-700); }
  a:hover { color: var(--orange-600); }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="ShopScreen.jsx"></script>
<script type="text/babel" src="ProductScreen.jsx"></script>
<script type="text/babel" src="ServicesScreen.jsx"></script>
<script type="text/babel">
const { useState } = React;
const { Icon, Button } = window.CellularSolutionsDesignSystem_a109cf;
const usd = (n) => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function CartDrawer({ open, items, onClose, onRemove }) {
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(24,24,27,0.4)', opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none', transition: 'opacity .25s', zIndex: 40 }} />
      <aside style={{ position: 'fixed', top: 0, right: 0, height: '100%', width: 380, background: '#fff', boxShadow: 'var(--shadow-lg)', transform: open ? 'translateX(0)' : 'translateX(100%)', transition: 'transform .25s var(--ease-out)', zIndex: 50, display: 'flex', flexDirection: 'column' }}>
        <div style={{ padding: '20px 24px', borderBottom: '1px solid var(--border-subtle)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 'var(--fs-h4)', fontWeight: 700, color: 'var(--text-strong)' }}>Your Cart</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-muted)', display: 'flex' }}><Icon name="x" size={22} /></button>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: 16 }}>
          {items.length === 0 && <div style={{ textAlign: 'center', color: 'var(--text-muted)', padding: '48px 0', fontSize: 'var(--fs-sm)' }}>Your cart is empty.</div>}
          {items.map((i, idx) => (
            <div key={idx} style={{ display: 'flex', gap: 12, padding: 12, alignItems: 'center' }}>
              <span style={{ width: 52, height: 52, borderRadius: 'var(--radius-sm)', background: 'var(--graphite-50)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name={i.icon || 'smartphone'} size={28} color="var(--graphite-400)" /></span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 'var(--fs-sm)', fontWeight: 600, color: 'var(--text-strong)' }}>{i.name}</div>
                <div style={{ fontSize: 'var(--fs-sm)', color: 'var(--text-muted)' }}>Qty {i.qty} · {usd(i.price)}</div>
              </div>
              <button onClick={() => onRemove(idx)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-faint)', display: 'flex' }}><Icon name="trash-2" size={16} /></button>
            </div>
          ))}
        </div>
        <div style={{ padding: 24, borderTop: '1px solid var(--border-subtle)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
            <span style={{ color: 'var(--text-muted)' }}>Subtotal</span>
            <span style={{ fontSize: 'var(--fs-h4)', fontWeight: 700, color: 'var(--text-strong)' }}>{usd(total)}</span>
          </div>
          <Button variant="product" fullWidth size="lg" disabled={items.length === 0}>Checkout</Button>
        </div>
      </aside>
    </>
  );
}

function App() {
  const [route, setRoute] = useState('home');
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [active, setActive] = useState(null);

  const add = (p, qty = 1) => { setCart(c => [...c, { ...p, qty }]); setCartOpen(true); };
  const nav = (r) => { setRoute(r); window.scrollTo(0, 0); };
  const openProduct = (p) => { setActive(p); nav('product'); };

  const count = cart.reduce((s, i) => s + i.qty, 0);
  return (
    <div>
      <Header route={route} onNav={nav} cartCount={count} />
      {route === 'home' && <HomeScreen onNav={nav} onAdd={add} onOpenProduct={openProduct} />}
      {route === 'shop' && <ShopScreen onAdd={add} />}
      {route === 'product' && <ProductScreen product={active} onAdd={add} onNav={nav} />}
      {route === 'services' && <ServicesScreen />}
      <Footer />
      <CartDrawer open={cartOpen} items={cart} onClose={() => setCartOpen(false)} onRemove={(i) => setCart(c => c.filter((_, x) => x !== i))} />
      <button onClick={() => setCartOpen(true)} style={{ position: 'fixed', bottom: 24, right: 24, display: count ? 'flex' : 'none', alignItems: 'center', gap: 8, height: 52, padding: '0 20px', background: 'var(--graphite-900)', color: '#fff', border: 'none', borderRadius: 'var(--radius-pill)', boxShadow: 'var(--shadow-lg)', cursor: 'pointer', fontFamily: 'var(--font-sans)', fontWeight: 600, zIndex: 30 }}>
        <Icon name="shopping-cart" size={18} /> {count}
      </button>
    </div>
  );
}

function boot() {
  if (!window.HomeScreen || !window.ShopScreen || !window.ProductScreen || !window.ServicesScreen || !window.Header) { setTimeout(boot, 40); return; }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
boot();
</script>
</body>
</html>
