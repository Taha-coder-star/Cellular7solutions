<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cellular Solutions — Admin</title>
<link rel="icon" href="../../assets/favicon.svg">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--surface-subtle); font-family: var(--font-sans); color: var(--text-body); }
  a { color: var(--orange-700); } a:hover { color: var(--orange-600); }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="AdminChrome.jsx"></script>
<script type="text/babel" src="AdminOverview.jsx"></script>
<script type="text/babel" src="ServiceRequests.jsx"></script>
<script type="text/babel">
const { useState } = React;
const TITLES = { overview: 'Overview', requests: 'Service Requests', orders: 'Orders', products: 'Products', customers: 'Customers' };
function App() {
  const [route, setRoute] = useState('overview');
  return (
    <div style={{ display: 'flex', minHeight: '100vh' }}>
      <Sidebar route={route} onNav={setRoute} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <Topbar title={TITLES[route] || 'Overview'} />
        {route === 'requests' ? <ServiceRequests /> : <AdminOverview />}
      </div>
    </div>
  );
}
function boot() {
  if (!window.Sidebar || !window.AdminOverview || !window.ServiceRequests) { setTimeout(boot, 40); return; }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
boot();
</script>
</body>
</html>
